name: Tests

on:
  push:
  pull_request:
    branches:
      - development

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Flutter action
        uses: subosito/flutter-action@v2.3.0
        # with:
          # The Flutter version to make available on the path
          # flutter-version: # optional
          # The Flutter build release channel
          # channel: # optional, default is stable

      - name: Decode firebase properties
        run: echo "${{secrets.FIREBASE_OPTIONS}}" > lib/firebase_options.dart
      - name: Decode key properties
        run: echo "${{secrets.KEY_PROD}}" > android/key.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1.1
        with:
          fileName: 'upload-keystore.jks'
          fileDir: 'android/'
          encodedString: ${{secrets.KEYJKS_PROD}}

      - name: Restore packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage
      
      - name: Upload code coverage to Codecov
        uses: codecov/codecov-action@v2.1.0
        with:
          files: coverage/lcov.info

      - uses: actions-ecosystem/action-get-latest-tag@v1
        id: get-latest-tag
        if: ${{ steps.release-label.outputs.level != null }}
      
